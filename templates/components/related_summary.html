{% if groupIDs|length %}
<table class="table table-striped table-sm table-hover">
    <tbody>
        <tr>
           <th>Ship Class</th>
           <th class="text-end">Lost<!-- / Fielded--></th>
           <th class="text-end">Points</th>
           <th class="text-end">ISK</th>
        </tr>
        {% for stats in groupIDs %}
        <tr>
            <td>{{ stats.groupName }}</td>
            <td class="text-end"><strong class="text-success">{{ stats.count|number_format(0) }}<!-- / {{ stats.fielded|length }}</strong>--></td>
            <td class="text-end"><strong class="text-success">{{ stats.points|number_format(0) }}</strong></td>
            <td class="text-end"><strong class="text-success">{{ stats.isk|number_format(2) }}</strong></td>
        </tr>
       {% endfor %}
    </tbody>
</table>
{% endif %}
