<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<meta name="description" content="Official zKillboard live map of New Eden.">
		<meta name="theme-color" content="#04070b">
		<link rel="canonical" href="/map/index.html">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap">
		<title>New Eden - Live | zKillboard.com</title>
		<style>
			:root {
				--bg: #04070b;
				--text: #eff6ff;
				--muted: rgba(221, 233, 248, 0.7);
			}

			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				overflow: hidden;
				background: var(--bg);
				color: var(--text);
				font-family: "Noto Sans", "Segoe UI", sans-serif;
			}

			body {
				background:
					radial-gradient(circle at 20% 20%, rgba(72, 108, 154, 0.18), transparent 35%),
					radial-gradient(circle at 80% 30%, rgba(68, 143, 198, 0.12), transparent 28%),
					linear-gradient(180deg, #05070b 0%, #030408 100%);
			}

			#mapApp { position: fixed; inset: 0; overflow: hidden; }
			#mapCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
			#mapCanvas:active { cursor: grabbing; }
			.vignette, .grid-overlay { position: absolute; inset: 0; pointer-events: none; }
			.vignette { background: radial-gradient(circle at center, transparent 55%, rgba(2, 4, 7, 0.55) 100%); }
			.grid-overlay {
				background-image: linear-gradient(rgba(130, 170, 220, 0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(130, 170, 220, 0.035) 1px, transparent 1px);
				background-size: 80px 80px;
				mask-image: radial-gradient(circle at center, black 42%, transparent 100%);
				opacity: 0.55;
			}
			.recenter-btn {
				position: absolute;
				top: 14px;
				right: 14px;
				z-index: 6;
				display: grid;
				place-items: center;
				width: 34px;
				height: 34px;
				padding: 0;
				border: 1px solid rgba(126, 179, 255, 0.24);
				border-radius: 10px;
				background: rgba(8, 12, 18, 0.84);
				color: #eff6ff;
				cursor: pointer;
				pointer-events: auto;
			}
			.recenter-btn:hover { background: rgba(18, 26, 38, 0.9); }
			.recenter-btn:active { transform: translateY(1px); }
			.recenter-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
			.projection-btn {
				position: absolute;
				top: 14px;
				right: 56px;
				z-index: 6;
				display: grid;
				place-items: center;
				min-width: 42px;
				height: 34px;
				padding: 0 10px;
				border: 1px solid rgba(126, 179, 255, 0.24);
				border-radius: 10px;
				background: rgba(8, 12, 18, 0.84);
				color: #eff6ff;
				font: italic 700 12px/1 "Noto Sans", "Segoe UI", sans-serif;
				letter-spacing: 0.08em;
				cursor: pointer;
				pointer-events: auto;
			}
			.projection-btn:hover { background: rgba(18, 26, 38, 0.9); }
			.projection-btn:active { transform: translateY(1px); }
			.projection-btn[data-mode="2d"] {
				border-color: rgba(126, 235, 205, 0.3);
				color: #c9ffe5;
			}
			.region-label-toggle {
				position: absolute;
				top: 56px;
				right: 14px;
				z-index: 6;
				display: grid;
				place-items: center;
				width: 34px;
				height: 34px;
				padding: 0;
				border: 1px solid rgba(126, 179, 255, 0.24);
				border-radius: 10px;
				background: rgba(8, 12, 18, 0.84);
				color: #eaf4ff;
				font: italic 700 11px/1 "Noto Sans", "Segoe UI", sans-serif;
				letter-spacing: 0.03em;
				text-transform: uppercase;
				cursor: pointer;
				pointer-events: auto;
			}
			.region-label-toggle:hover { background: rgba(18, 26, 38, 0.9); }
			.region-label-toggle:active { transform: translateY(1px); }
			.region-label-toggle[aria-pressed="true"] {
				border-color: rgba(126, 235, 205, 0.3);
				color: #c9ffe5;
			}
			.map-ambient-volume {
				position: absolute;
				top: 96px;
				right: 14px;
				z-index: 6;
				display: grid;
				grid-template-columns: 1fr;
				gap: 6px;
				width: 34px;
				box-sizing: border-box;
				padding: 8px 4px 7px;
				border: 1px solid rgba(126, 179, 255, 0.24);
				border-radius: 10px;
				background: rgba(8, 12, 18, 0.84);
				backdrop-filter: blur(8px);
				pointer-events: auto;
				justify-items: center;
			}
			.map-ambient-volume label {
				font: italic 700 9px/1 "Noto Sans", "Segoe UI", sans-serif;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: rgba(221, 233, 248, 0.82);
			}
			.map-ambient-volume input[type="range"] {
				width: 14px;
				height: 96px;
				margin: 0;
				accent-color: #87f5cf;
				writing-mode: vertical-lr;
				direction: rtl;
				-webkit-appearance: slider-vertical;
			}
			.region-activity {
				position: absolute;
				right: 14px;
				bottom: 14px;
				z-index: 6;
				min-width: 220px;
				max-width: 280px;
				padding: 8px 10px;
				border: 1px solid rgba(126, 179, 255, 0.18);
				border-radius: 10px;
				background: rgba(8, 12, 18, 0.82);
				backdrop-filter: blur(8px);
				pointer-events: auto;
			}
			.system-activity {
				position: absolute;
				right: 252px;
				bottom: 14px;
				z-index: 6;
				min-width: 220px;
				max-width: 280px;
				padding: 8px 10px;
				border: 1px solid rgba(126, 179, 255, 0.18);
				border-radius: 10px;
				background: rgba(8, 12, 18, 0.82);
				backdrop-filter: blur(8px);
				pointer-events: auto;
			}
			.system-activity[hidden] { display: none; }
			.region-activity[hidden] { display: none; }
			.region-activity-title {
				margin: 0 0 6px;
				font-size: 10px;
				text-transform: uppercase;
				letter-spacing: 0.12em;
				color: var(--muted);
			}
			.region-activity-table { width: 100%; border-collapse: collapse; font-size: 12px; }
			.region-activity-table td { padding: 3px 0; }
			.region-activity-table td:last-child { text-align: right; color: rgba(223, 237, 255, 0.9); }
			.system-activity-table { width: 100%; border-collapse: collapse; font-size: 12px; }
			.system-activity-table td { padding: 3px 0; }
			.system-activity-table td:last-child { text-align: right; color: rgba(223, 237, 255, 0.9); }
			.region-activity-table tr,
			.system-activity-table tr { cursor: pointer; }
			.region-activity-table tr:hover td,
			.system-activity-table tr:hover td { color: #ffffff; }
			.killmail-stream { position: absolute; top: 0; left: 18px; width: 292px; height: 100vh; height: 100dvh; overflow: hidden; pointer-events: auto; }
			.feed-list { list-style: none; margin: 0; padding: 0; overflow: hidden; position: absolute; inset: 0; }
			.feed-list li { padding: 8px 0; margin-bottom: 6px; border-bottom: 1px solid rgba(255, 255, 255, 0.09); }
			.feed-list li a { color: inherit; text-decoration: none; display: block; }
			.feed-list li a:hover .kill-system { color: #ffffff; }
			.kill-row { display: grid; grid-template-columns: 42px minmax(0, 1fr); gap: 10px; align-items: center; }
			.kill-image { width: 42px; height: 42px; border-radius: 10px; overflow: hidden; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); }
			.kill-image img { display: block; width: 100%; height: 100%; object-fit: cover; }
			.kill-copy { min-width: 0; }
			.kill-time { font-size: 11px; color: var(--muted); }
			.kill-system { font-size: 14px; font-weight: 700; margin-top: 2px; }
			.kill-meta { font-size: 11px; color: rgba(221, 233, 248, 0.78); margin-top: 2px; }
			.loading { position: absolute; inset: 0; display: grid; place-items: center; background: rgba(2, 4, 7, 0.82); backdrop-filter: blur(12px); z-index: 8; }
			.loading[hidden] { display: none; }
			.loading-card { padding: 20px 24px; border-radius: 18px; border: 1px solid rgba(121, 183, 255, 0.18); background: rgba(8, 12, 18, 0.92); text-align: center; }
			.loading-card strong { display: block; font-size: 18px; margin-bottom: 8px; }
			.loading-card span { font-size: 13px; color: var(--muted); }
			@media (max-width: 1100px) {
				.killmail-stream { left: 18px; right: 18px; width: auto; }
			}
			@media (max-width: 720px) {
				.killmail-stream { left: 12px; right: 12px; width: auto; }
			}
		</style>
	</head>
	<body>
		<div id="mapApp">
			<canvas id="mapCanvas" aria-label="New Eden map canvas"></canvas>
			<div class="grid-overlay"></div>
			<div class="vignette"></div>
			<button id="recenterButton" class="recenter-btn" type="button" aria-label="Re-center map">
				<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
					<circle cx="12" cy="12" r="6"></circle>
					<path d="M12 2v3"></path>
					<path d="M12 19v3"></path>
					<path d="M2 12h3"></path>
					<path d="M19 12h3"></path>
				</svg>
			</button>
			<button id="projectionToggle" class="projection-btn" type="button" data-mode="2d" aria-label="Switch map projection" aria-pressed="true">2D</button>
			<button id="regionLabelToggle" class="region-label-toggle" type="button" aria-label="Toggle region labels" aria-pressed="false" title="Toggle region labels">RG</button>
			<div class="map-ambient-volume" aria-label="Map ambience volume">
				<label for="ambientVolumeSlider">AMB</label>
				<input id="ambientVolumeSlider" type="range" min="0" max="1" step="0.01" value="0" aria-label="Map ambience volume">
			</div>
			<aside class="killmail-stream" id="liveKillsPanel">
				<ul class="feed-list" id="liveKillFeed"></ul>
			</aside>
			<aside id="regionActivity" class="region-activity" hidden>
				<h2 class="region-activity-title">Top Active Regions</h2>
				<table class="region-activity-table" aria-label="Top active regions">
					<tbody id="regionActivityBody"></tbody>
				</table>
			</aside>
			<aside id="systemActivity" class="system-activity" hidden>
				<h2 class="region-activity-title">Top Active Systems</h2>
				<table class="system-activity-table" aria-label="Top active systems">
					<tbody id="systemActivityBody"></tbody>
				</table>
			</aside>
			<div id="mapLoading" class="loading">
				<div class="loading-card">
					<strong>Loading...</strong>
				</div>
			</div>
		</div>
		<script>
			window.mapPageConfig = {
				websocketUrl: '/websocket/',
				systemsUrl: '/data/mapSystems.jsonl',
				systems2dUrl: '/data/mapSystems2d.jsonl',
				regionsUrl: '/data/mapRegions.jsonl',
				constellationsUrl: '/data/mapConstellations.jsonl'
			};
		</script>
		<script src="/js/ambience.js?v=map1"></script>
		<script src="/map/map.js?v=ws3"></script>
	</body>
</html>
