[www]
user = www-data
group = www-data

listen = 9000

pm = ondemand
pm.max_children = 48
pm.process_idle_timeout = 10s
pm.max_requests = 500

request_terminate_timeout = 45s
request_slowlog_timeout = 0
slowlog = /tmp/php-fpm.slow.log

pm.status_path = /status
ping.path = /ping
ping.response = pong

clear_env = no
catch_workers_output = yes
decorate_workers_output = no

; Keep access logging off by default to avoid per-request log volume.
; access.log = /proc/self/fd/2

php_admin_flag[log_errors] = on